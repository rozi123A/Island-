services:
  - type: web
    name: chat-live-connecte
    runtime: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm db:push && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
